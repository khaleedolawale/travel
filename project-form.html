<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        body{
            /* margin: 0; */
            /* padding: 0; */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
        }

        .box{
            /* border: 2px solid black; */
            height: 90vh;
            border-radius: 9px;
            width: 38%;
            background-color: white;

            h1{
                font-family: 'Poppins', sans-serif;
                padding-left: 10px;
            }
        }

        .empty{
            /* border: 2px dotted red; */
            width: 100%;
            height: 80px;
            /* padding: 20px; */
        }

        .mpty{
            position: relative;
            top: -15px;
        }

        .mpty::after{
        content: "";
        position: absolute;
        width: 100%;
        background-color: rgba(128, 128, 128, 0.496);
        height: 1px;
        } 

        .bud{
            /* border: 2px dotted blue; */
            width: 100%;
            height: 71vh;
            /* padding: 7px; */
        }

        input[type=text],
        input[type=email]{
            display: block;
            width: 95%;
            height: 50px;
            border: 2px solid whitesmoke;
            margin-bottom: 25px;
            margin-left: 9px;
        }

        input::placeholder{
            font-size: 1.2em;
            padding-left: 10px;
        }

        input:focus{
            font-size: 1.3em;
        }

        select{
            display: block;
            width: 96%;
            height: 50px;
            margin-bottom: 25px;
            margin-left: 9px;
            font-size: 1em;
            padding-left: 10px;
            color: grey;
            font-weight: lighter;
            border: 2px solid whitesmoke;
        }

        textarea{
            width: 95%;
            height: 120px;
            margin-bottom: 25px;
            margin-left: 9px;
            border: 2px solid whitesmoke;
        }

        textarea::placeholder{
            font-size: 1.3em;
            padding: 10px 0 0 10px;
        }

        .bot{
            width: 140px;
            height: 50px;
            border-radius: 30px;
            color: white;
            background-color: orange;
            font-weight: bolder;
            font-size: 1em;
            cursor: pointer;
            border: none;
            margin-left: 9px;
        }

        .bot:hover{
                background: transparent;
                color: black;
                border: 1.5px solid orange;
                transition: 0.5s ease-in-out;
            }

        .pity{
            position: relative;
            top: -10px;
        }

        .pity::after{
        content: "";
        position: absolute;
        width: 100%;
        background-color: rgba(128, 128, 128, 0.496);
        height: 1px;
        } 

        .btn{
            /* border: 2px solid black; */
            display: flex;
            justify-content: right;
        }

        .dot{
            background-color: rgb(227, 227, 227);
            width: 55px;
            height: 30px;
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
            cursor: pointer;
            border: none;
            margin-right: 15px;
        }

        @media(width <= 450px){
            *{
                contain: none;
                z-index: 1;
            }

            .box{
                width: 100%;
                height: 100vh;
            }
        }
    </style>
<body>
    <div class="box">
        <div class="empty">
            <h1>Book a Tour</h1>

            <div class="mpty">

            </div>
        </div>

       <div class="bud">
            <input type="text" placeholder="Enter Name">

            <input type="email" placeholder="Enter Email">

            <select name="" id="">
                <option value="">How Many Person?</option>
                <option value="">1 person</option>
                <option value="">2 people</option>
                <option value="">3 people</option>
            </select>

            <select name="" id="">
                <option value="">How Many Days?</option>
                <option value="">2 days</option>
                <option value="">3 days</option>
                <option value="">4 days</option>
            </select>

            <textarea name="" id="" placeholder="Your Message"></textarea>

            <button class="bot">Book Now</button>
       </div>

       <div class="pity">
            
       </div>

       <!-- <div class="btn">
            <button class="dot">close</button>
       </div> -->
    </div>
</body>
</html>
